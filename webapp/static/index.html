<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AIBM — An LLM-powered agent-based travel demand model</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>" />

  <!-- MapLibre GL JS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css"
  />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

  <!-- deck.gl standalone bundle -->
  <script src="https://unpkg.com/deck.gl@9.1.4/dist.min.js"></script>

  <!-- Inter font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- marked.js (Markdown renderer) -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>

  <!-- App styles -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="map-container">
    <!-- Loading overlay -->
    <div id="loading-overlay"><div class="spinner"></div></div>

    <!-- Map legend -->
    <div id="legend">
      <div class="leg-row">
        <span class="leg-dot" style="background:#2d72d2"></span>
        <span class="leg-label">Car</span>
      </div>
      <div class="leg-row">
        <span class="leg-dot" style="background:#29a634"></span>
        <span class="leg-label">Bike</span>
      </div>
      <div class="leg-row">
        <span class="leg-dot" style="background:#d1980b"></span>
        <span class="leg-label">Transit</span>
      </div>
      <div class="leg-row">
        <span class="leg-dot" style="background:#cd4246"></span>
        <span class="leg-label">Walk</span>
      </div>
      <div class="leg-row">
        <span class="leg-dot" style="background:#738091"></span>
        <span class="leg-label">Activity</span>
      </div>
      <div class="leg-row">
        <span class="leg-dot" style="background:#404854"></span>
        <span class="leg-label">Home</span>
      </div>
    </div>

    <div id="tooltip"></div>
    <div id="mode-bubble" class="hidden">
      <div class="bubble-content"></div>
    </div>
  </div>

  <!-- Time controls bar -->
  <div id="time-bar">
    <button id="btn-play" title="Play / Pause">Play</button>
    <select id="select-speed" title="Playback speed">
      <option value="1">1x</option>
      <option value="10" selected>10x</option>
      <option value="60">60x</option>
      <option value="120">120x</option>
    </select>
    <input
      id="slider-time"
      type="range"
      min="0"
      max="1440"
      step="1"
      value="360"
    />
    <span id="label-time">06:00</span>
  </div>

  <div id="side-panel">
    <div id="panel-header">
      <div class="panel-title">
        <h2>AIBM <span class="alpha-badge">alpha</span></h2>
        <p class="subtitle">An LLM-powered agent-based travel demand model</p>
      </div>
      <div id="social-links"></div>
      <button id="btn-about">
        <span class="label-long">About this project</span><span class="label-short">About</span>
      </button>
      <button id="btn-panel-toggle" class="mobile-only" aria-label="Expand panel">Stats ▲</button>
    </div>
    <div id="panel-body">
      <div id="kpi-area"></div>
      <div id="detail-area"></div>
    </div>
  </div>

  <div id="about-overlay" class="hidden" role="dialog" aria-modal="true">
    <div id="about-panel">
      <div id="about-header">
        <h2>About AIBM</h2>
        <button id="btn-close-about" aria-label="Close">&times;</button>
      </div>
      <div id="about-body"></div>
    </div>
  </div>

  <!-- App scripts -->
  <script src="js/layers.js"></script>
  <script src="js/animation.js"></script>
  <script src="js/panels.js"></script>
  <script src="js/about.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
