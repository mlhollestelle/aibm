study_area:
  name: walcheren

boundaries:
  wfs_url: "https://service.pdok.nl/cbs/gebiedsindelingen/2024/wfs/v1_0"
  wfs_layer: "gebiedsindelingen:gemeente_gegeneraliseerd"
  municipality_codes: ["GM0687", "GM0717", "GM0718"]

grid:
  raw_zip: "2025-cbs_vk100_2024_v1.zip"
  gpkg_file: "cbs_vk100_2024_v1.gpkg"
  gpkg_layer: "cbs_vk100_2024"
  bbox: [15000, 385000, 40000, 405000]

network:
  # Road/active modes. Transit is configured separately in the transit: block.
  modes: ["car", "bike", "walk"]
  bike_speed_kmh: 18.0
  walk_speed_kmh: 5.0
  default_car_speed_kmh: 30.0
  unreachable: 999.0
  highway_speeds:
    motorway: 100
    motorway_link: 60
    trunk: 80
    trunk_link: 50
    primary: 80
    primary_link: 50
    secondary: 70
    secondary_link: 50
    tertiary: 50
    tertiary_link: 30
    residential: 30
    living_street: 15
    unclassified: 50
    service: 20

synthesis:
  seed: 42

simulation:
  # Number of households to simulate. 200 ≈ 10-15 min with gpt-4o-mini.
  n_households: 200
  # Random seed for zone sampling. LLM responses remain non-deterministic.
  seed: 42
  # LLM model ID. Provider is auto-detected from prefix:
  #   gpt-*/o1/o3 → OpenAI, claude-* → Anthropic,
  #   grok-* → xAI, else → Gemini.
  model: "gpt-4o-mini"
  # Max LLM requests per minute. Match to your API tier to avoid 429s.
  rate_limit_rpm: 500
  # Zones offered per work/school choice. Higher = better quality but
  # more tokens per call. 10-15 is a good range.
  n_zone_candidates: 12
  # POIs offered per discretionary destination choice. Higher = better
  # quality but more tokens per call. 10-15 is a good range.
  n_poi_candidates: 10
  # Concurrent households in the thread pool. Higher = faster but more
  # API pressure. Keep ≤ rate_limit_rpm / 10.
  max_workers: 4
  # ── Prompt overrides (optional) ──────────────────────────────
  #
  # Each prompt has three configurable sections:
  #   role            — frames the agent's identity/mindset
  #   context_framing — introduces the data block
  #   instructions    — tells the LLM what to do and how to respond
  #
  # The data block between context_framing and instructions is
  # auto-injected at runtime (demographics, candidates, travel
  # times, etc.) and cannot be overridden here.
  #
  # Only list the sections you want to change — omitted sections
  # keep their built-in defaults.
  #
  # Placeholders use {name} syntax and are expanded at runtime.
  #
  # prompts:
  #
  #   # ── persona ──────────────────────────────────────────────
  #   # Method: Agent.generate_persona()
  #   # Placeholders: {agent_name}
  #   # Data block: agent demographics + household context
  #   persona:
  #     role: |
  #       You are creating a behavioural profile for {agent_name}.
  #     context_framing: "Demographics:"
  #     instructions: |
  #       Write a 1-2 sentence persona describing this person's
  #       travel habits, preferences, and daily routine. Be
  #       specific and grounded in the demographics above.
  #
  #   # ── mode_choice ──────────────────────────────────────────
  #   # Method: Agent.choose_mode() / choose_tour_mode()
  #   # Placeholders: {agent_name}
  #   # Data block: background + available mode options with
  #   #   travel times
  #   mode_choice:
  #     role: |
  #       You are {agent_name}, deciding how to travel today.
  #     context_framing: "Background:"
  #     instructions: |
  #       Pick exactly one mode. Respond with:
  #       - "reasoning": a short personal story (2-3 sentences)
  #         explaining your choice.
  #       - "choice": the mode name exactly as listed above.
  #
  #   # ── zone_choice ──────────────────────────────────────────
  #   # Method: Agent.choose_work_zone() / choose_school_zone()
  #   # Placeholders: {agent_name}, {purpose}
  #   # Data block: background + candidate zones with POI counts
  #   #   + travel times from home
  #   zone_choice:
  #     role: |
  #       You are {agent_name}, choosing a {purpose} location.
  #     context_framing: "Background:"
  #     instructions: |
  #       Pick exactly one zone id for your {purpose}. Respond
  #       with the zone id and your reasoning.
  #
  #   # ── activities ───────────────────────────────────────────
  #   # Method: Agent.generate_activities()
  #   # Placeholders: {agent_name}, {types_list}
  #   # Data block: agent background
  #   activities:
  #     role: |
  #       You are {agent_name}, planning your day.
  #     context_framing: "Background:"
  #     instructions: |
  #       Only include out-of-home activities. Include mandatory
  #       activities: work if employed, school if student. Also
  #       include any discretionary activities.
  #       Allowed activity types: {types_list}.
  #
  #   # ── destination ──────────────────────────────────────────
  #   # Method: Agent.choose_destination()
  #   # Placeholders: {agent_name}
  #   # Data block: background + activity type + candidate zones
  #   #   / POIs + travel times
  #   destination:
  #     role: |
  #       You are {agent_name}, choosing where to do an activity.
  #     context_framing: "Background:"
  #     instructions: |
  #       Pick exactly one id (including the zone: or poi:
  #       prefix) from the list above. Respond with the id and
  #       your reasoning.
  #
  #   # ── scheduling ───────────────────────────────────────────
  #   # Method: Agent.schedule_activities()
  #   # Placeholders: {agent_name}
  #   # Data block: background + activity list + travel times
  #   #   between activities + duration hints
  #   scheduling:
  #     role: |
  #       You are {agent_name}, scheduling your day.
  #     context_framing: "Background:"
  #     instructions: |
  #       Assign start_time and end_time (HH:MM strings) to each
  #       activity. Fixed activities have realistic fixed hours;
  #       flexible ones fill the remaining time.
  #
  #   # ── discretionary ────────────────────────────────────────
  #   # Method: Agent.plan_discretionary_activities()
  #   # Placeholders: {agent_name}
  #   # Data block: background + timeline + free gaps + few-shot
  #   #   example + candidate POIs with travel times + durations
  #   # Note: applies to both with-gaps and no-gaps variants.
  #   discretionary:
  #     role: |
  #       You are {agent_name}, planning the rest of your day.
  #     context_framing: "Background:"
  #     instructions: |
  #       For each activity: choose a destination, specify which
  #       gap it fits in, and assign start_time and end_time as
  #       HH:MM strings. You must be home by 23:00.
  #
  #   # ── vehicle_allocation ───────────────────────────────────
  #   # Method: Household.allocate_vehicles()
  #   # Placeholders: (none)
  #   # Data block: vehicle count + member tour summaries with
  #   #   destinations and travel times
  #   vehicle_allocation:
  #     role: "You are deciding vehicle access for a household."
  #     context_framing: ""
  #     instructions: |
  #       Assign vehicle access (true/false) to each member for
  #       each tour. Prioritise members who need the car most.
  #
  #   # ── escort ───────────────────────────────────────────────
  #   # Method: Household.plan_escort_trips()
  #   # Placeholders: (none)
  #   # Data block: children needing escort + parent schedules
  #   escort:
  #     role: "You are arranging escort trips for a household."
  #     context_framing: |
  #       This household needs to arrange escort trips for
  #       children who cannot travel alone.
  #     instructions: |
  #       For each child activity, assign a parent for drop-off
  #       and a parent for pick-up. Same parent can do both.
  #
  #   # ── joint_activities ─────────────────────────────────────
  #   # Method: Household.plan_joint_activities()
  #   # Placeholders: (none)
  #   # Data block: member schedules + candidate POIs
  #   joint_activities:
  #     role: "You are planning shared activities for a household."
  #     context_framing: |
  #       This household is considering shared activities that
  #       members can do together.
  #     instructions: |
  #       Propose 0-2 joint activities that fit everyone's
  #       schedule. Each needs a destination, start/end time,
  #       and which members participate.

providers:
  - gpt_4o_mini
  - gpt_4o_mini_seed2
  - claude_haiku_4_5
  - grok_4_1_fast_non_reasoning
  - grok_4_1_fast_reasoning
  - gemini_2_0_flash

iterations:
  - baseline
  - v1_trip_rate

transit:
  # Set enabled: false to exclude transit from the simulation entirely.
  enabled: true
  route_types: ["bus", "train", "tram", "ferry"]
  bus_speed_kmh: 20.0
  train_speed_kmh: 80.0
  tram_speed_kmh: 25.0
  ferry_speed_kmh: 15.0
  walk_speed_kmh: 5.0
  max_walk_to_stop_m: 800
  avg_wait_min: 10.0
