# v2: Improve mode realism and scheduling discipline.
#
# Builds on v1 trip-rate fixes and adds:
#   - mode_choice prompt — distance-appropriate mode guidance for the
#     Netherlands (high cycling rates, Dutch ODiN norms).
#   - scheduling prompt — strict minimum/maximum durations and realistic
#     start-time windows per activity type.

simulation:
  prompts:
    activities:
      instructions: |
        Plan only the activities you would genuinely do on this specific
        day — not everything you might do over the course of a week.

        Ask yourself: "Would I actually leave the house for this today?"
        Discretionary activities (shopping, leisure, eating out,
        personal business) are occasional, not daily. On most days,
        most people do only their mandatory activity and return home.

        Realistic daily patterns by persona:
        - Employed full-time: work + at most 1 discretionary stop
          (e.g. groceries on the way home — not both groceries and leisure)
        - Part-time worker: work + at most 1 discretionary activity
        - Student: school + at most 1 discretionary activity
        - Retired / not working: 1-2 activities total
          (a single errand, a social visit, or a medical appointment)
        - Child / teenager: school; after-school activity only if it is
          a regular weekly commitment

        Return an empty discretionary list if there is no compelling
        reason to make an extra trip today.

        For each activity specify is_flexible (work and school are always
        false; discretionary activities are true).
        Allowed activity types: {types_list}.

    discretionary:
      instructions: |
        Before planning each activity, ask: "Would I really go out for
        this today, or can it wait until another day?"

        Only keep an activity if:
        - It fits within an available gap without requiring a significant
          detour (roughly: the destination adds less than 15 minutes of
          extra travel compared to going straight home), OR
        - It is genuinely urgent or time-sensitive today.

        If an activity does not pass this test, leave it out. It is
        perfectly fine to return fewer activities than listed, or an
        empty list.

        For activities you do keep: choose a destination, assign
        start_time and end_time (HH:MM strings) within the available
        gap, and ensure the schedule is feasible including travel time.
        You must be home by 23:00.
        Return entries in chronological order.

    mode_choice:
      instructions: |
        Pick exactly one mode from the options above.

        Distance-appropriate mode guidance for the Netherlands:
        - Walking is typical for trips under 3 km.
        - Cycling is very common for trips under 10 km (the Netherlands
          has the highest cycling rate in Europe).
        - Car is used mainly for longer trips (> 10 km) or when carrying
          heavy loads.
        - Transit is used for medium-to-long distances, especially by
          people without a car or licence.

        Respond with:
        - "reasoning": a short personal explanation (2-3 sentences).
        - "choice": the mode name exactly as listed above.

    scheduling:
      instructions: |
        Assign start_time and end_time (HH:MM strings) to each activity.

        Strict scheduling rules (that ~90% of people adhere to.):
        - Work: start between 07:00 and 10:00, duration 6-9 hours.
        - School: start between 08:00 and 09:00, duration 5-7 hours.
        - Shopping: minimum 15 minutes, maximum 90 minutes.
        - Leisure: minimum 30 minutes.
        - Eating out: minimum 30 minutes, maximum 90 minutes.
        - Personal business: minimum 15 minutes, maximum 60 minutes.
        - Escort (drop-off/pick-up): 10-15 minutes.

        Activities must not overlap. Allow realistic travel time between
        consecutive activities (at least 10 minutes). The agent should
        be home by 23:00.
