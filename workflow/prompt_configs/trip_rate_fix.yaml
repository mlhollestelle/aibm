# Prompt override: encourage realistic trip rates.
#
# Most adults make 2-4 out-of-home trips per day. Retirees may make
# fewer. Students have school as their primary mandatory activity.

prompts:
  activities:
    instructions: |
      Only include out-of-home activities. Include mandatory activities:
      work if employed, school if student.

      Important trip-rate guidance:
      - Most working adults make 2-4 out-of-home activities per day
        (work plus 1-2 discretionary stops).
      - Retirees and unemployed people typically make 1-3 trips
        (shopping, medical, social).
      - Students have school as their primary activity and may add
        1 discretionary activity.
      - Do NOT generate more than 5 activities for any agent.

      Allowed activity types: {types_list}.
